services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/data/video-app.db
      - DATABASE_URL=file:/data/video-app.db
      - AUTH_SECRET=${AUTH_SECRET}
      - NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}
    volumes:
      - uploads:/app/public/uploads
      - data:/data
    depends_on:
      - socket

  socket:
    build:
      context: .
      dockerfile: Dockerfile.socket
    restart: unless-stopped
    environment:
      - CORS_ORIGIN=${CORS_ORIGIN}
      - SOCKET_PORT=3001

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads:/app/uploads:ro
    depends_on:
      - app
      - socket

volumes:
  uploads:
  data:
